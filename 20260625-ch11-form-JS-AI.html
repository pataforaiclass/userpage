<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表單練習(JS)</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/all.min.css">

  <!-- Medieval ERP Style -->
  <style>
    :root {
      --bg-dark: #16120d;
      --bg-card: rgba(36, 28, 18, 0.92);
      --bg-panel: rgba(54, 42, 27, 0.95);

      --gold: #d8b36a;
      --gold-light: #f5ddb0;
      --bronze: #8a6234;

      --line: rgba(216, 179, 106, .25);

      --text-main: #f4e7cf;
      --text-sub: #c6b89c;

      --success: #7ccf7c;
      --danger: #ff8d8d;

      --shadow:
        0 0 0 1px rgba(216, 179, 106, .18),
        0 10px 30px rgba(0, 0, 0, .45);
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(8, 8, 8, .72), rgba(8, 8, 8, .78)),
        url("https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?q=80&w=1920&auto=format&fit=crop") center/cover fixed;
      color: var(--text-main);
      font-family:
        "Segoe UI",
        "Microsoft JhengHei",
        sans-serif;
      letter-spacing: .5px;
    }

    .container {
      max-width: 1200px;
    }

    /* ===== 主標題 ===== */
    .display-4 {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(216, 179, 106, .35);
      background:
        linear-gradient(135deg,
          rgba(64, 47, 26, .98),
          rgba(25, 20, 15, .98));
      color: var(--gold-light) !important;
      text-shadow: 0 0 10px rgba(255, 220, 140, .3);
      box-shadow: var(--shadow);
      padding: 1.2rem !important;
      margin-bottom: 1rem;
    }

    .display-4::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg,
          transparent 0%,
          rgba(255, 255, 255, .05) 40%,
          transparent 80%);
      pointer-events: none;
    }

    .display-4 i {
      color: var(--gold);
      margin-right: 12px;
    }

    /* ===== 主表單卡片 ===== */
    .col-md-6 {
      background: var(--bg-card);
      border: 1px solid rgba(216, 179, 106, .2);
      border-radius: 18px;
      padding: 2rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    /* ===== Label ===== */
    .form-label {
      color: var(--gold-light);
      font-weight: 600;
      margin-bottom: .55rem;
    }

    /* ===== Input ===== */
    .form-control,
    .form-select,
    textarea,
    .form-control-sm {
      background: rgba(15, 12, 9, .92) !important;
      border: 1px solid rgba(216, 179, 106, .25) !important;
      color: var(--text-main) !important;
      border-radius: 10px !important;
      transition: all .25s ease;
      box-shadow: none !important;
    }

    .form-control:focus,
    .form-select:focus,
    textarea:focus,
    .form-control-sm:focus {
      border-color: var(--gold) !important;
      box-shadow:
        0 0 0 .2rem rgba(216, 179, 106, .15) !important;
      background: rgba(25, 20, 14, .96) !important;
    }

    .form-control::placeholder,
    textarea::placeholder {
      color: #9d8c72;
    }

    /* ===== floating ===== */
    .form-floating>label {
      color: #bca782;
    }

    .form-floating>.form-control:focus~label,
    .form-floating>.form-control:not(:placeholder-shown)~label {
      color: var(--gold-light);
    }

    /* ===== radio checkbox ===== */
    .form-check {
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(216, 179, 106, .08);
      padding: .65rem 1rem .65rem 2.2rem;
      border-radius: 10px;
      margin-bottom: .6rem;
      margin-right: .5rem !important;
      transition: all .2s ease;
    }

    .form-check:hover {
      background: rgba(216, 179, 106, .06);
      border-color: rgba(216, 179, 106, .25);
    }

    .form-check-input {
      background-color: #2a2118;
      border-color: rgba(216, 179, 106, .45);
    }

    .form-check-input:checked {
      background-color: var(--gold);
      border-color: var(--gold);
    }

    .form-check-label {
      color: var(--text-sub);
    }

    /* ===== switch ===== */
    .form-switch {
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(216, 179, 106, .12);
      border-radius: 12px;
      padding: 1rem 1rem 1rem 3.5rem;
    }

    #pStatusText {
      color: var(--gold-light);
      font-weight: 600;
    }

    /* ===== 按鈕 ===== */
    .btn {
      border-radius: 12px;
      padding: .7rem 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      transition: all .25s ease;
    }

    .btn-primary {
      background:
        linear-gradient(135deg,
          #9d6f37,
          #d8b36a);
      color: #24180d;
      box-shadow:
        0 5px 18px rgba(216, 179, 106, .25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .btn-secondary {
      background:
        linear-gradient(135deg,
          #3c3c3c,
          #616161);
      color: #f1f1f1;
    }

    .btn-warning {
      background:
        linear-gradient(135deg,
          #5d3a18,
          #c68f3c);
      color: #fff6df;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    /* ===== 驗證 ===== */
    .valid-feedback {
      color: var(--success);
    }

    .invalid-feedback {
      color: var(--danger);
    }

    .is-valid {
      border-color: rgba(124, 207, 124, .7) !important;
    }

    .is-invalid {
      border-color: rgba(255, 141, 141, .75) !important;
    }

    /* ===== 確認區 ===== */
    #showMessageRow {
      margin-top: 2rem;
    }

    #showMessageRow .display-6 {
      border-radius: 18px 18px 0 0;
      background:
        linear-gradient(135deg,
          #324929,
          #1c2f16) !important;
      color: #e8ffe2;
      border: 1px solid rgba(122, 195, 122, .25);
      box-shadow: var(--shadow);
    }

    #showMessage {
      background: var(--bg-panel);
      border:
        1px solid rgba(216, 179, 106, .18);
      border-top: none;
      border-radius: 0 0 18px 18px;
      padding: 1rem;
      box-shadow: var(--shadow);
    }

    /* ===== table ===== */
    .table {
      margin-bottom: 0;
      color: var(--text-main);
      border-color: rgba(216, 179, 106, .18) !important;
      overflow: hidden;
      border-radius: 14px;
    }

    .table tr {
      border-color: rgba(216, 179, 106, .1);
    }

    .table th {
      background: rgba(216, 179, 106, .08);
      color: var(--gold-light);
      font-weight: 700;
      padding: 1rem;
      border-color: rgba(216, 179, 106, .1) !important;
    }

    .table td {
      background: rgba(255, 255, 255, .02);
      padding: 1rem;
      color: var(--text-sub);
      border-color: rgba(216, 179, 106, .08) !important;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #120f0b;
    }

    ::-webkit-scrollbar-thumb {
      background: #6b522f;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a37a43;
    }

    /* ===== 響應式 ===== */
    @media (max-width: 768px) {

      .col-md-6 {
        padding: 1.25rem;
      }

      .display-4 {
        font-size: 2rem;
      }

      .form-check {
        display: block;
        width: 100%;
      }

      .btn {
        width: 100%;
        margin-bottom: .75rem;
      }

      .text-end {
        text-align: center !important;
      }
    }
  </style>
</head>

<body>
  <div class="container pt-5">
    <div class="display-4 fw-bold text-center text-bg-primary py-2"><i class="fa-solid fa-dragon"></i>奇異動物園生物建檔</div>
    <div class="row justify-content-center">
      <div class="col-md-6 mt-3">
        <div class="mb-3 form-floating">
          <input type="text" class="form-control" name="pName" id="pName" placeholder="">
          <div class="valid-feedback">生物名稱字數符合規格</div>
          <div class="invalid-feedback">生物名稱字數不符合規格</div>
          <label for="pName" class="form-label">生物名稱(字數限10字以內)</label>
        </div>

        <div class="mb-3">
          <label for="pNumber" class="form-label">數量</label>
          <input type="number" class="form-control" name="pNumber" id="pNumber" value="1" min="1" max="1000">
          <div class="valid-feedback">生物數量符合限制</div>
          <div class="invalid-feedback">生物數量不符合限制，限制在1~1000之內</div>
        </div>

        <div class="mb-3">
          <label for="pSize" class="form-label">生物體型</label>
          <input type="text" class="form-control" name="pSize" id="pSize" placeholder="" list="pSizeList">
          <datalist id="pSizeList">
            <option value="超巨型"></option>
            <option value="巨型"></option>
            <option value="大型"></option>
            <option value="中型"></option>
            <option value="小型"></option>
            <option value="微型"></option>
          </datalist>
          <div class="valid-feedback">輸入字數符合規格</div>
          <div class="invalid-feedback">輸入字數不符合規格(限3字內)</div>
        </div>

        <div class="mb-3">
          <label for="pType" class="form-label">生物類型</label>
          <select name="pType" id="pType" class="form-select">
            <option value="" disabled selected class="">***請選擇生物類型***</option>
            <option value="異怪">異怪</option>
            <option value="野獸">野獸</option>
            <option value="天界生物">天界生物</option>
            <option value="構裝生物">構裝生物</option>
            <option value="龍類">龍類</option>
            <option value="元素">元素</option>
            <option value="精類">精類</option>
            <option value="邪魔">邪魔</option>
            <option value="巨人">巨人</option>
            <option value="類人生物">類人生物</option>
            <option value="怪獸">怪獸</option>
            <option value="泥怪">泥怪</option>
            <option value="植物">植物</option>
            <option value="不死生物">不死生物</option>
          </select>
          <div class="valid-feedback">已選擇生物類型</div>
          <div class="invalid-feedback">請選擇生物類型</div>
        </div>

        <div class="mb-3">
          <label for="pIntro" class="form-label">簡介</label>
          <textarea rows="7" class="form-control" name="pIntro" id="pIntro" placeholder="若無資訊可留白"></textarea>
        </div>

        <div class="mb-3">
          <div class="form-label">使用場地</div>
          <div id="pSiteGroup" class="">
            <div class="form-check form-check-inline">
              <input type="radio" name="pSite" class="form-check-input pSite" value="室外">
              <label for="" class="form-check-label">室外</label>
            </div>
            <div class="form-check form-check-inline">
              <input type="radio" name="pSite" class="form-check-input pSite" value="室內">
              <label for="" class="form-check-label">室內</label>
            </div>
            <div class="form-check form-check-inline">
              <input type="radio" name="pSite" class="form-check-input pSite" value="水族箱">
              <label for="" class="form-check-label">水族箱</label>
            </div>
            <div class="form-check form-check-inline">
              <input type="radio" name="pSite" class="form-check-input pSite" value="恆溫箱">
              <label for="" class="form-check-label">恆溫箱</label>
            </div>
            <div class="form-check form-check-inline">
              <input type="radio" name="pSite" class="form-check-input pSite" value="其他">
              <label for="" class="form-check-label">
                其他
                <input type="text" id="pSiteOther" class="form-control-sm">
              </label>
            </div>
          </div>
          <div class="valid-feedback">已選擇使用場地</div>
          <div class="invalid-feedback" id="pSiteInv">請選擇使用場地</div>
        </div>

        <div class="mb-3">
          <div class="form-label">園區所需配件</div>
          <div id="pAccGroup" class="">
            <div class="form-check form-check-inline">
              <input type="checkbox" name="pAcc" class="form-check-input pAcc" value="額外窩棚">
              <label for="" class="form-check-label">額外窩棚</label>
            </div>
            <div class="form-check form-check-inline">
              <input type="checkbox" name="pAcc" class="form-check-input pAcc" value="爬架">
              <label for="" class="form-check-label">爬架</label>
            </div>
            <div class="form-check form-check-inline">
              <input type="checkbox" name="pAcc" class="form-check-input pAcc" value="抓板">
              <label for="" class="form-check-label">抓板</label>
            </div>
            <div class="form-check form-check-inline">
              <input type="checkbox" name="pAcc" class="form-check-input pAcc" value="滾輪">
              <label for="" class="form-check-label">滾輪</label>
            </div>
            <div class="form-check form-check-inline">
              <input type="checkbox" name="pAcc" class="form-check-input pAcc" value="耐咬玩具">
              <label for="" class="form-check-label">耐咬玩具</label>
            </div>
          </div>
        </div>

        <div class="mb-3 form-check form-switch">
          <input type="checkbox" name="pStatus" id="pStatus" class="form-check-input" checked>
          <label for="pStatus" class="form-check-label" id="pStatusText">目前狀態：展覽中</label>
        </div>

        <div class="mt-4 mb-4 text-end">
          <button id="btnCancel" class="btn btn-secondary">取消</button>
          <button id="btnSubmit" class="btn btn-primary">確認</button>
        </div>
      </div>
    </div>
    <div id="showMessageRow" class="row justify-content-center mb-4 d-none">
      <div class="display-6 fw-bold text-center text-bg-success mb-2">生物建檔 - 明細確認</div>
      <div class="col-md-6">
        <div id="showMessage"></div>
        <div class="mt-4 text-end">
          <button id="btnShowMessageCancel" class="btn btn-secondary">取消</button>
          <button id="btnShowMessageSubmit" class="btn btn-warning">確認</button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/jquery-4.0.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    let flag_pName = false;
    let flag_pNumber = true;
    let flag_pSize = false;
    let flag_pType = false;
    let flag_pSite = false;
    $(function () {
      //網頁重整時消除 hash
      if (window.location.hash) {
        // 先回到最上方
        $("html, body").scrollTop(0);
        // 移除網址 hash
        history.replaceState(
          null,
          null,
          window.location.pathname + window.location.search
        );
      }

      //監聽pName
      $("#pName").on("input", function () {
        // console.log($(this).val());
        let pName = $(this).val().trim();
        if (pName.length >= 1 && pName.length <= 10) {
          //符合規定
          $(this).removeClass("is-invalid").addClass("is-valid");
          flag_pName = true;
        } else {
          //不符合規定
          $(this).removeClass("is-valid").addClass("is-invalid");
          flag_pName = false;
        }
      });
      //監聽pNumber
      $("#pNumber").on("input", function () {
        let pNumber = Number($(this).val());
        if (pNumber >= 1 && pNumber <= 1000) {
          $(this).removeClass("is-invalid").addClass("is-valid");
          flag_pNumber = true;
        } else {
          $(this).removeClass("is-valid").addClass("is-invalid");
          flag_pNumber = false;
        }
      });
      $("#pSize").on("input", function () {
        // console.log($(this).val());
        let pSize = $(this).val().trim();
        if (pSize.length >= 1 && pSize.length <= 3) {
          //符合規定
          $(this).removeClass("is-invalid").addClass("is-valid");
          flag_pSize = true;
        } else {
          //不符合規定
          $(this).removeClass("is-valid").addClass("is-invalid");
          flag_pSize = false;
        }
      });
      $("#pType").on("blur", function () {
        if ($(this).val() != null) {
          $(this).removeClass("is-invalid").addClass("is-valid");
          flag_pType = true;
        } else {
          $(this).removeClass("is-valid").addClass("is-invalid");
          flag_pType = false;
        }
      });
      $("#pStatus").on("change", function () {
        let pStatus = $(this).prop("checked");
        if (pStatus) {
          $("#pStatusText").text("目前狀態：展覽中");
        } else {
          $("#pStatusText").text("目前狀態：休養中");
        }
      });
      $(".pSite").on("change", function () {
        if ($(".pSite:checked").val() != undefined && $(".pSite:checked").val() != "其他") {
          // console.log($(".pSite:checked").val());
          $("#pSiteGroup").removeClass("is-invalid").addClass("is-valid");
          flag_pSite = true;
        } else if ($(".pSite:checked").val() == "其他") {
          if ($("#pSiteOther").val() == null || $("#pSiteOther").val().trim() == "") {
            $("#pSiteInv").text("請輸入其他場地名稱");
            $("#pSiteGroup").removeClass("is-valid").addClass("is-invalid");
            flag_pSite = false;
          }
          $("#pSiteOther").on("change", function () {
            if ($("#pSiteOther").val() != null && $("#pSiteOther").val().trim() != "") {
              $("#pSiteGroup").removeClass("is-invalid").addClass("is-valid");
              flag_pSite = true;
            } else {
              $("#pSiteInv").text("請輸入其他場地名稱");
              $("#pSiteGroup").removeClass("is-valid").addClass("is-invalid");
              flag_pSite = false;
            }
          });
        } else {
          $("#pSiteGroup").removeClass("is-valid").addClass("is-invalid");
          flag_pSite = false;
        }
      });

      //按鈕監聽btnSubmit
      $("#btnSubmit").on("click", function () {
        let pIntro = ($("#pIntro").val() == "" || $("#pIntro").val() == null) ? "暫無簡介" : $("#pIntro").val().trim();
        if (flag_pName && flag_pNumber && flag_pSize && flag_pType && flag_pSite) {
          let pSite = $(".pSite:checked").val() == "其他" ? $("#pSiteOther").val().trim() : $(".pSite:checked").val();

          let pAccArr = [];
          $(".pAcc:checked").each(function () {
            pAccArr.push($(this).val());
          });
          if (pAccArr.length == 0) {
            pAccArr.push("無需配件");
          }

          let pStatusText = $("#pStatus").prop("checked") ? "展覽中" : "休養中";

          let strHTML = `<table class="table border mt-3">
          <tr>
            <th class="col-2 text-end">名稱<th>
            <td class="col-10">${$("#pName").val().trim()}</td>
          </tr>
          <tr>
            <th class="col-2 text-end">數量<th>
            <td class="col-10">${$("#pNumber").val()}</td>
          </tr>
          <tr>
            <th class="col-2 text-end">體型<th>
            <td class="col-10">${$("#pSize").val().trim()}</td>
          </tr>
          <tr>
            <th class="col-2 text-end">類型<th>
            <td class="col-10">${$("#pType").val().trim()}</td>
          </tr>
          <tr>
            <th class="col-2 text-end">簡介<th>
            <td class="col-10">${pIntro}</td>
          </tr>
          <tr>
            <th class="col-2 text-end">使用場地<th>
            <td class="col-10">${pSite}</td>
          </tr>
          <tr>
            <th class="col-2 text-end">園區配件<th>
            <td class="col-10">${pAccArr.join("、")}</td>
          </tr>
          <tr>
            <th class="col-2 text-end">目前狀態<th>
            <td class="col-10">${pStatusText}</td>
          </tr>
          </table>`;

          $("#showMessageRow").removeClass("d-none");
          $("#showMessage").html(strHTML);

          window.location.hash = "#showMessageRow";
        } else {
          let jump = "";
          if (!flag_pSite) {
            if ($(".pSite:checked").val() == "其他") {
              $("#pSiteInv").text("請輸入其他場地名稱");
            }
            $("#pSiteGroup").removeClass("is-valid").addClass("is-invalid");
            jump = "#pSiteGroup";
          }
          if (!flag_pType) {
            $("#pType").removeClass("is-valid").addClass("is-invalid");
            jump = "#pType";
          }
          if (!flag_pSize) {
            $("#pSize").removeClass("is-valid").addClass("is-invalid");
            jump = "#pSize";
          }
          if (!flag_pNumber) {
            $("#pNumber").removeClass("is-valid").addClass("is-invalid");
            jump = "#pNumber";
          }
          if (!flag_pName) {
            $("#pName").removeClass("is-valid").addClass("is-invalid");
            jump = "#pName";
          }
          window.location.hash = jump;
          Swal.fire({
            title: "警告",
            text: "有欄位錯誤，請修正",
            icon: "warning"
          });
        }
      });
    });
  </script>
</body>

</html>
